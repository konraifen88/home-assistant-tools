blueprint:
  name: Binary Sensor/Input Boolean Updating Notification
  description: >
    Sends a tagged notification when a binary sensor or input boolean turns on,
    updates that notification every 10 seconds with a counter while the entity
    stays on, and clears the notification when the entity turns off.
  domain: automation
  author: Konrad Gruener

  input:
    sensor_settings:
      name: Trigger entity
      icon: mdi:electric-switch
      input:
        binary_sensor:
          name: Trigger entity
          description: "Binary sensor or input boolean that controls the notification. Default: on = active, off = inactive."
          selector:
            entity:
              domain:
                - binary_sensor
                - input_boolean

        on_state:
          name: On state value
          default: "on"
          selector:
            text:

        off_state:
          name: Off state value
          default: "off"
          selector:
            text:

    notification_settings:
      name: Notifications
      icon: mdi:bell
      input:
        notify_mobile_app_devices:
          name: Mobile app notify devices
          description: >
            Mobile app devices offered by Home Assistant. Notifications are sent
            through notify.mobile_app_<device_id>.
          default: []
          selector:
            device:
              integration: mobile_app
              multiple: true

        notify_services:
          name: Additional notify services
          description: >
            Optional list of notify services or notify groups, e.g.:
            notify.mobile_app_konrad
            notify.mobile_app_smartphone_partner
            notify.family
          default: []
          selector:
            text:
              multiple: true

        notification_tag:
          name: Notification update tag
          description: >
            Tag used to update the active notification instead of creating a new
            one each time. Many mobile app notify services support this.
          default: "binary_sensor_updating_notification"
          selector:
            text:

        notification_title:
          name: Title
          description: >
            Placeholders: [ENTITY] for the sensor name and [COUNT] for the update counter.
          default: "[ENTITY] active"
          selector:
            text:

        notification_message:
          name: Message
          description: >
            Placeholders: [ENTITY] for the sensor name and [COUNT] for the update counter.
          default: "Update counter: [COUNT]"
          selector:
            text:
              multiline: true

        notification_clear_service:
          name: Notification clear service
          description: >
            Optional additional service that can clear or dismiss the active notification
            when the sensor turns off. The blueprint also sends the standard mobile app
            clear_notification command to every configured notify target.
          default: ""
          selector:
            text:

        dismissal_action_title:
          name: Dismiss action label
          description: >
            Action button label. Tapping this button stops further updates until
            the trigger entity turns off.
          default: "Dismiss"
          selector:
            text:

        dismissal_helper:
          name: Legacy dismissal helper entity
          description: >
            No longer required. Kept only so existing automations with this input
            continue to load.
          default: ""
          selector:
            entity:
              domain:
                - input_boolean

trigger:
  - platform: state
    entity_id: !input binary_sensor
    to: !input on_state
    id: turned_on

condition: []

action:
  - variables:
      sensor_entity: !input binary_sensor
      on_state_value: !input on_state
      off_state_value: !input off_state
      notify_mobile_app_devices: !input notify_mobile_app_devices
      notify_services: !input notify_services
      notification_tag: !input notification_tag
      notification_title_raw: !input notification_title
      notification_message_raw: !input notification_message
      notification_clear_service: !input notification_clear_service
      dismissal_action_title: !input dismissal_action_title
      sensor_name: >-
        {{
          area_name(sensor_entity)
          or state_attr(sensor_entity, 'friendly_name')
          or sensor_entity
        }}
      notification_tag_full: "{{ (notification_tag ~ '_' ~ sensor_entity) | replace('.', '_') }}"
      notification_targets: >-
        {%- set ns = namespace(targets=[]) -%}
        {%- for device_id in notify_mobile_app_devices -%}
          {%- set service = 'notify.mobile_app_' ~ (device_attr(device_id, 'name') | slugify) -%}
          {%- set ns.targets = ns.targets + [dict(service=service, device_id=device_id)] -%}
        {%- endfor -%}
        {%- for service in notify_services -%}
          {%- set ns.targets = ns.targets + [dict(service=service, device_id='')] -%}
        {%- endfor -%}
        {{ ns.targets }}
      dismissed_services: []
      notification_was_sent: false

  - repeat:
      while:
        - condition: template
          value_template: "{{ is_state(sensor_entity, on_state_value) }}"
      sequence:
        - variables:
            counter: "{{ repeat.index }}"
            notification_title: >-
              {{
                (notification_title_raw | string)
                | replace('[ENTITY]', sensor_name | string)
                | replace('[COUNT]', counter | string)
              }}
            notification_message: >-
              {{
                (notification_message_raw | string)
                | replace('[ENTITY]', sensor_name | string)
                | replace('[COUNT]', counter | string)
              }}
            notification_was_sent: true

        - repeat:
            for_each: "{{ notification_targets }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ repeat.item.service not in dismissed_services }}"
                    sequence:
                      - service: "{{ repeat.item.service }}"
                        data:
                          title: "{{ notification_title }}"
                          message: "{{ notification_message }}"
                          data:
                            tag: "{{ notification_tag_full }}"
                            alert_once: true
                            actions:
                              - action: "DISMISS_NOTIFICATION"
                                title: "{{ dismissal_action_title }}"
                                action_data:
                                  tag: "{{ notification_tag_full }}"
                                  notify_service: "{{ repeat.item.service }}"

        - wait_for_trigger:
            - platform: state
              entity_id: !input binary_sensor
              to: !input off_state
              id: turned_off
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "DISMISS_NOTIFICATION"
              id: notification_dismissed
            - platform: event
              event_type: mobile_app_notification_cleared
              id: notification_cleared
          timeout:
            seconds: 10
          continue_on_timeout: true

        - variables:
            dismissed_service: >-
              {%- if wait.trigger is not none and wait.trigger.event is defined -%}
                {%- set data = wait.trigger.event.data -%}
                {%- set action_data = data.get('action_data', {}) -%}
                {%- if action_data.get('notify_service') -%}
                  {{ action_data.get('notify_service') }}
                {%- elif data.get('notify_service') -%}
                  {{ data.get('notify_service') }}
                {%- elif data.get('device_id') -%}
                  {%- set ns = namespace(service='') -%}
                  {%- for target in notification_targets -%}
                    {%- if target.device_id == data.get('device_id') -%}
                      {%- set ns.service = target.service -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {{ ns.service }}
                {%- else -%}
                  {{ '' }}
                {%- endif -%}
              {%- else -%}
                {{ '' }}
              {%- endif -%}
            dismissed_services_next: >-
              {{
                (dismissed_services + [dismissed_service]) | unique | list
                if dismissed_service | length > 0
                else dismissed_services
              }}

        - variables:
            dismissed_services: "{{ dismissed_services_next }}"

        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ dismissed_service | length > 0 }}"
              sequence:
                - service: "{{ dismissed_service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: "{{ notification_tag_full }}"

                - choose:
                    - conditions:
                        - condition: template
                          value_template: >-
                            {{ dismissed_services_next | length >= notification_targets | length }}
                      sequence:
                        - stop: "All notification targets dismissed until trigger entity turns off"
            - conditions:
                - condition: template
                  value_template: >-
                    {{
                      wait.trigger is not none
                      and wait.trigger.id in ['notification_dismissed', 'notification_cleared']
                    }}
              sequence:
                - delay:
                    seconds: 10

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notification_was_sent }}"
        sequence:
          - repeat:
              for_each: "{{ notification_targets }}"
              sequence:
                - service: "{{ repeat.item.service }}"
                  data:
                    message: clear_notification
                    data:
                      tag: "{{ notification_tag_full }}"

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notification_clear_service | length > 0 }}"
                sequence:
                  - service: "{{ notification_clear_service }}"
                    data:
                      tag: "{{ notification_tag_full }}"

mode: parallel
max_exceeded: silent
