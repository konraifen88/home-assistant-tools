blueprint:
  name: Window Warning (no helpers) with summer low-point logic
  description: >
    Notifies when a window has been left open based on multiple conditions:
    1) The window has been open for more than the configured time.
    2) The room temperature drops below a configurable winter threshold.
    3) In summer mode: the room cooled while the window was open and then starts warming again,
       indicating that the window should be closed.

    This variant does not require input_number helpers. Start and minimum temperatures are
    stored only while the window is open and the monitoring run is active. This transient state
    is lost on Home Assistant restart or when automations are reloaded.

    Notifications are sent to a list of notify services. Additional actions (KNX, TTS, scripts,
    etc.) can be attached per trigger.
  domain: automation
  author: Konrad Gruener

  input:
    room_settings:
      name: Room and sensors
      icon: mdi:home-thermometer
      input:
        window_sensor:
          name: Window sensor
          description: "Binary sensor for the window. Default assumption: on = open, off = closed."
          selector:
            entity:
              domain: binary_sensor

        inside_temp_sensor:
          name: Indoor temperature sensor
          description: Temperature sensor placed in the room.
          selector:
            entity:
              domain: sensor
              device_class: temperature

        outside_temp_sensor:
          name: Outside temperature sensor (optional)
          description: >
            Optional. Can be used to improve plausibility checks for the summer warning.
            Leave empty if not available.
          default: ""
          selector:
            entity:
              domain: sensor
              device_class: temperature

        open_state:
          name: Open state value
          description: Usually the window contact reports "on" when open.
          default: "on"
          selector:
            text:

        closed_state:
          name: Closed state value
          description: Usually the window contact reports "off" when closed.
          default: "off"
          selector:
            text:

        check_interval_minutes:
          name: Check interval
          description: >
            How often (in minutes) the automation is re-evaluated at latest, even if the
            temperature hasn't changed. Temperature changes trigger an immediate re-check.
          default: 2
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: min
              mode: box

    notification_settings:
      name: Notifications
      icon: mdi:bell
      input:
        notify_services:
          name: Notify targets
          description: >
            List of notify services, e.g.:
            notify.mobile_app_konrad
            notify.mobile_app_smartphone_partner
            You can also provide a notify group such as notify.window_warning.
          default: []
          selector:
            text:
              multiple: true

        notification_tag:
          name: Notification update tag
          description: >
            Optional tag used to update the active notification instead of creating
            a new one each time. Many mobile app notify services support this.
          default: "window_warning"
          selector:
            text:

        notification_clear_service:
          name: Notification clear service
          description: >
            Optional service that can clear or dismiss the active notification when
            the window is closed. Example: mobile_app.clear_notification.
          default: ""
          selector:
            service: {}

    open_too_long_settings:
      name: "Condition: Window open too long"
      icon: mdi:timer-alert
      input:
        open_too_long_enabled:
          name: Enable
          default: true
          selector:
            boolean:

        open_too_long_minutes:
          name: Minutes open before warning
          default: 30
          selector:
            number:
              min: 1
              max: 240
              step: 1
              unit_of_measurement: min
              mode: box

        open_too_long_title:
          name: Title
          default: "Window still open"
          selector:
            text:

        open_too_long_message:
          name: Message
          default: >-
            {{ area }}: The window has been open for approximately {{ open_minutes | round(0) }} minutes.
            Current room temperature: {{ inside_temp }} °C.
          selector:
            text:
              multiline: true

        open_too_long_actions:
          name: Optional additional actions
          description: Optional actions, e.g. KNX, TTS, light signal or a script.
          default: []
          selector:
            action:

    winter_settings:
      name: "Condition: Winter / room cooling"
      icon: mdi:snowflake-alert
      input:
        winter_enabled:
          name: Enable
          default: true
          selector:
            boolean:

        winter_temp_threshold:
          name: Room temperature lower bound
          default: 18
          selector:
            number:
              min: 5
              max: 25
              step: 0.1
              unit_of_measurement: "°C"
              mode: box

        winter_title:
          name: Title
          default: "Window open - room cooling"
          selector:
            text:

        winter_message:
          name: Message
          default: >-
            {{ area }}: The window is open and the room temperature is {{ inside_temp }} °C.
            The configured threshold is {{ winter_temp_threshold }} °C.
          selector:
            text:
              multiline: true

        winter_actions:
          name: Optional additional actions
          description: Optional actions, e.g. KNX, TTS, light signal or a script.
          default: []
          selector:
            action:

    summer_settings:
      name: "Condition: Summer / room warms after cooling"
      icon: mdi:weather-sunny-alert
      input:
        summer_enabled:
          name: Enable
          default: true
          selector:
            boolean:

        summer_min_open_minutes:
          name: Minimum open minutes
          description: Prevents warnings immediately after opening due to sensor noise.
          default: 30
          selector:
            number:
              min: 0
              max: 480
              step: 1
              unit_of_measurement: min
              mode: box

        summer_min_cooling:
          name: Minimum cooling since opening
          description: >
            The room must have cooled by at least this value since opening before
            re-warming is evaluated.
          default: 1.0
          selector:
            number:
              min: 0
              max: 10
              step: 0.1
              unit_of_measurement: "°C"
              mode: box

        summer_rise_from_min:
          name: Rise from minimum
          description: >
            Trigger when the room temperature has risen by this value since the minimum
            recorded while the window was open.
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 5
              step: 0.1
              unit_of_measurement: "°C"
              mode: box

        summer_outside_guard_enabled:
          name: Use outside temperature guard
          description: >
            When enabled, the summer warning is only triggered if an outside temperature sensor
            is set and the outside temperature is not significantly cooler than inside. Useful
            to avoid warnings while it is still cooler outside.
          default: false
          selector:
            boolean:

        summer_outside_margin:
          name: Outside temperature margin
          description: >
            Only relevant when the outside guard is enabled. Example: 0.5 means the outside
            temperature must be at most 0.5 °C cooler than inside for the warning to trigger.
          default: 0.5
          selector:
            number:
              min: 0
              max: 5
              step: 0.1
              unit_of_measurement: "°C"
              mode: box

        summer_title:
          name: Title
          default: "Please close window - room warming again"
          selector:
            text:

        summer_message:
          name: Message
          default: >-
            {{ area }}: The room cooled from {{ start_temp }} °C to {{ min_temp }} °C
            and is now back to {{ inside_temp }} °C. Rise since minimum: {{ rise_from_min }} °C.
          selector:
            text:
              multiline: true

        summer_actions:
          name: Optional additional actions
          description: Optional actions, e.g. KNX, TTS, light signal or a script.
          default: []
          selector:
            action:

trigger:
  - platform: state
    entity_id: !input window_sensor
    to: !input open_state
    id: opened

condition: []

action:
  - variables:
      window_entity: !input window_sensor
      inside_temp_entity: !input inside_temp_sensor
      outside_temp_entity: !input outside_temp_sensor
      open_state_value: !input open_state
      closed_state_value: !input closed_state
      notify_services: !input notify_services

      check_interval_minutes: !input check_interval_minutes

      open_too_long_enabled: !input open_too_long_enabled
      open_too_long_minutes: !input open_too_long_minutes

      winter_enabled: !input winter_enabled
      winter_temp_threshold: !input winter_temp_threshold

      summer_enabled: !input summer_enabled
      summer_min_open_minutes: !input summer_min_open_minutes
      summer_min_cooling: !input summer_min_cooling
      summer_rise_from_min: !input summer_rise_from_min
      summer_outside_guard_enabled: !input summer_outside_guard_enabled
      summer_outside_margin: !input summer_outside_margin

      area: >-
        {{
          area_name(window_entity)
          or area_name(inside_temp_entity)
          or state_attr(window_entity, 'friendly_name')
          or window_entity
        }}

      start_ts: "{{ as_timestamp(now()) }}"
      start_temp: "{{ states(inside_temp_entity) | float(0) }}"
      min_temp: "{{ states(inside_temp_entity) | float(0) }}"
      warning_reason: "none"
      notification_sent: false
      notification_tag_full: "{{ (notification_tag ~ '_' ~ window_entity) | replace('.', '_') }}"

  - repeat:
      while:
        - condition: template
          value_template: >-
            {{
              is_state(window_entity, open_state_value)
            }}
      sequence:
        - wait_for_trigger:
            - platform: state
              entity_id: !input window_sensor
              to: !input closed_state
              id: closed

            - platform: state
              entity_id: !input inside_temp_sensor
              id: temperature_changed
          timeout:
            minutes: !input check_interval_minutes
          continue_on_timeout: true

        - variables:
            current_temp_raw: "{{ states(inside_temp_entity) | float(0) }}"
            min_temp: "{{ [min_temp | float(0), current_temp_raw | float(0)] | min }}"
            inside_temp: "{{ current_temp_raw | float(0) | round(1) }}"
            outside_temp: >-
              {% if outside_temp_entity | length > 0 and states(outside_temp_entity) | is_number %}
                {{ states(outside_temp_entity) | float | round(1) }}
              {% else %}
                {{ none }}
              {% endif %}
            open_minutes: "{{ ((as_timestamp(now()) - start_ts | float(0)) / 60) | round(1) }}"
            cooling: "{{ (start_temp | float(0) - min_temp | float(0)) | round(1) }}"
            rise_from_min: "{{ (current_temp_raw | float(0) - min_temp | float(0)) | round(1) }}"
            outside_guard_ok: >-
              {{
                not summer_outside_guard_enabled
                or (
                  outside_temp_entity | length > 0
                  and states(outside_temp_entity) | is_number
                  and states(outside_temp_entity) | float >= current_temp_raw | float - summer_outside_margin | float
                )
              }}

        - choose:
            - conditions:
                - condition: template
                  value_template: >-
                    {{
                      is_state(window_entity, open_state_value)
                      and warning_reason == 'none'
                      and winter_enabled
                      and current_temp_raw | float <= winter_temp_threshold | float
                    }}
              sequence:
                - variables:
                    warning_reason: "winter"

            - conditions:
                - condition: template
                  value_template: >-
                    {{
                      is_state(window_entity, open_state_value)
                      and warning_reason == 'none'
                      and summer_enabled
                      and open_minutes | float >= summer_min_open_minutes | float
                      and cooling | float >= summer_min_cooling | float
                      and rise_from_min | float >= summer_rise_from_min | float
                      and outside_guard_ok
                    }}
              sequence:
                - variables:
                    warning_reason: "summer"

            - conditions:
                - condition: template
                  value_template: >-
                    {{
                      is_state(window_entity, open_state_value)
                      and warning_reason == 'none'
                      and open_too_long_enabled
                      and open_minutes | float >= open_too_long_minutes | float
                    }}
              sequence:
                - variables:
                    warning_reason: "open_too_long"

        - variables:
            notification_title: >-
              {% if warning_reason == 'winter' %}
                {{ winter_title }}
              {% elif warning_reason == 'summer' %}
                {{ summer_title }}
              {% elif warning_reason == 'open_too_long' %}
                {{ open_too_long_title }}
              {% else %}
                {{ none }}
              {% endif %}
            notification_message: >-
              {% if warning_reason == 'winter' %}
                {{ winter_message }}
              {% elif warning_reason == 'summer' %}
                {{ summer_message }}
              {% elif warning_reason == 'open_too_long' %}
                {{ open_too_long_message }}
              {% else %}
                {{ none }}
              {% endif %}

        - choose:
            - conditions:
                - condition: template
                  value_template: >-
                    {{ warning_reason != 'none' }}
              sequence:
                - repeat:
                    for_each: !input notify_services
                    sequence:
                      - service: "{{ repeat.item }}"
                        data:
                          title: "{{ notification_title }}"
                          message: "{{ notification_message }}"
                          data:
                            tag: "{{ notification_tag_full }}"

                - choose:
                    - conditions:
                        - condition: template
                          value_template: >-
                            {{ warning_reason == 'open_too_long' and not notification_sent }}
                      sequence:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ true }}"
                              sequence: !input open_too_long_actions
                        - variables:
                            notification_sent: true

                    - conditions:
                        - condition: template
                          value_template: >-
                            {{ warning_reason == 'winter' and not notification_sent }}
                      sequence:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ true }}"
                              sequence: !input winter_actions
                        - variables:
                            notification_sent: true

                    - conditions:
                        - condition: template
                          value_template: >-
                            {{ warning_reason == 'summer' and not notification_sent }}
                      sequence:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ true }}"
                              sequence: !input summer_actions
                        - variables:
                            notification_sent: true

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ warning_reason != 'none' and notification_clear_service | length > 0 }}
        sequence:
          - service: !input notification_clear_service
            data:
              tag: "{{ notification_tag_full }}"

mode: single
max_exceeded: silent
